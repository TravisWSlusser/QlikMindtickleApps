<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qlik Enablement Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --deep-blue: #19426C; --deep-blue-dark: #112d4e; --cell-bg: #1a3f6a;
    --cell-weekend: #163459; --cell-hover: #1e4a7a; --tooltip-bg: #0d2d4a;
    --green: #009845; --sky: #10CFC9; --ocean-pill: #0a7a9a; --purple: #6B4EAF;
    --text: #ffffff; --text-muted: rgba(255,255,255,0.55); --text-dim: rgba(255,255,255,0.28);
    --border: rgba(255,255,255,0.07); --border-light: rgba(255,255,255,0.13);
    --dot-apac: #ef4444; --dot-emea: #10CFC9; --dot-nam: #60a5fa; --dot-latam: #9ca3af;
  }
  html,body { width:100%; background:var(--deep-blue); font-family:'Inter',sans-serif; color:var(--text); overflow:hidden; }
  .wrapper { max-width:1400px; margin:0 auto; padding:20px 16px 24px; }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .month-nav { display:flex; align-items:center; gap:12px; }
  .month-title { font-size:22px; font-weight:800; letter-spacing:-0.3px; color:#fff; min-width:150px; }
  .nav-btn { background:rgba(255,255,255,0.08); border:1px solid var(--border-light); color:var(--text); width:30px; height:30px; border-radius:6px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; user-select:none; }
  .nav-btn:hover { background:rgba(255,255,255,0.16); }
  .nav-btn:disabled { opacity:0.3; cursor:default; }
  .region-legend { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .region-item { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:500; color:var(--text-muted); }
  .region-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .desktop-view { display:block; }
  .mobile-view { display:none; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); border-radius:12px; overflow:hidden; border:1px solid var(--border-light); gap:1px; background:var(--border-light); }
  .day-header { background:var(--deep-blue-dark); padding:9px 10px; font-size:10px; font-weight:700; letter-spacing:0.9px; text-transform:uppercase; color:var(--text-muted); text-align:center; }
  .cal-cell { background:var(--cell-bg); min-height:108px; padding:8px 8px 22px; position:relative; transition:background 0.12s; }
  .cal-cell.weekend { background:var(--cell-weekend); }
  .cal-cell.empty { background:var(--deep-blue-dark); }
  .cal-cell.today { background:#1c4a7e; }
  .cal-cell.protected-bg { background:rgba(0,152,69,0.08); }
  .cal-cell:not(.empty):hover { background:var(--cell-hover); }
  .cell-date { font-size:13px; font-weight:500; color:var(--text-muted); line-height:1; margin-bottom:6px; }
  .cal-cell.today .cell-date { color:#fff; font-weight:800; }
  .event-pill { display:block; width:100%; padding:3px 7px; border-radius:5px; font-size:10.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:3px; cursor:pointer; transition:filter 0.12s,transform 0.1s; }
  .event-pill:hover { filter:brightness(1.15); transform:scaleY(1.04); }
  .pill-module { background:var(--ocean-pill); color:#fff; }
  .pill-cert { background:var(--sky); color:#0d2240; }
  .pill-spark { background:var(--green); color:#fff; }
  .pill-protected { background:rgba(0,152,69,0.35); color:rgba(255,255,255,0.9); border:1px solid rgba(0,152,69,0.45); }
  .pill-offsite { background:var(--purple); color:#fff; }
  .holiday-dots { position:absolute; bottom:6px; left:7px; display:flex; gap:3px; }
  .hdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .tooltip { position:fixed; background:var(--tooltip-bg); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:13px 15px; width:240px; z-index:9999; pointer-events:none; box-shadow:0 12px 40px rgba(0,0,0,0.5); display:none; }
  .tooltip.visible { display:block; }
  .tooltip-title { font-size:13px; font-weight:700; color:#fff; margin-bottom:6px; line-height:1.3; }
  .tooltip-desc { font-size:11.5px; color:var(--text-muted); line-height:1.5; margin-bottom:9px; }
  .tooltip-tags { display:flex; flex-wrap:wrap; gap:5px; }
  .ttag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; }
  .ttag-green { background:var(--green); color:#fff; }
  .ttag-sky { background:var(--sky); color:#0d2240; }
  .ttag-ocean { background:var(--ocean-pill); color:#fff; }
  .ttag-purple { background:var(--purple); color:#fff; }
  .ttag-dark { background:rgba(255,255,255,0.12); color:var(--text-muted); }
  .ttag-today { background:#fff; color:#0d2240; }
  .agenda-list { display:flex; flex-direction:column; gap:8px; }
  .agenda-week { background:rgba(255,255,255,0.04); border:1px solid var(--border-light); border-radius:10px; overflow:hidden; }
  .agenda-week-header { background:var(--deep-blue-dark); padding:8px 14px; font-size:10px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); display:flex; align-items:center; justify-content:space-between; }
  .agenda-week-dates { font-size:10px; font-weight:400; color:var(--text-dim); text-transform:none; letter-spacing:0; }
  .agenda-day { padding:10px 14px; border-top:1px solid var(--border); display:flex; align-items:flex-start; gap:12px; }
  .agenda-day-label { flex-shrink:0; width:36px; text-align:center; }
  .agenda-day-num { font-size:18px; font-weight:800; line-height:1; color:#fff; }
  .agenda-day-name { font-size:9px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-muted); margin-top:2px; }
  .agenda-day.today-day .agenda-day-num { color:var(--sky); }
  .agenda-events { flex:1; display:flex; flex-direction:column; gap:5px; }
  .agenda-pill { padding:7px 10px; border-radius:7px; font-size:12px; font-weight:600; line-height:1.3; cursor:pointer; transition:filter 0.12s; }
  .agenda-pill:hover { filter:brightness(1.1); }
  .agenda-pill .pill-sub { font-size:10px; font-weight:400; opacity:0.75; margin-top:2px; }
  .agenda-pill.pill-module { background:var(--ocean-pill); color:#fff; }
  .agenda-pill.pill-cert { background:var(--sky); color:#0d2240; }
  .agenda-pill.pill-spark { background:var(--green); color:#fff; }
  .agenda-pill.pill-protected { background:rgba(0,152,69,0.3); color:rgba(255,255,255,0.9); border:1px solid rgba(0,152,69,0.45); }
  .agenda-pill.pill-offsite { background:var(--purple); color:#fff; }
  .agenda-dots { display:flex; gap:3px; margin-top:4px; }
  .agenda-no-events { padding:12px 14px; font-size:12px; color:var(--text-dim); border-top:1px solid var(--border); font-style:italic; }
  .legend { display:flex; align-items:center; gap:14px; margin-top:14px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-muted); }
  .legend-pill { width:22px; height:9px; border-radius:3px; }
  .legend-dot { width:7px; height:7px; border-radius:50%; }
  .legend-sep { width:1px; height:14px; background:var(--border-light); }
  .summary-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-top:14px; }
  .summary-card { background:rgba(255,255,255,0.05); border:1px solid var(--border-light); border-radius:10px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .summary-card-label { font-size:12px; font-weight:500; color:var(--text-muted); flex:1; }
  .summary-badge { font-size:11px; font-weight:700; padding:4px 11px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
  .badge-sky { background:var(--sky); color:#0d2240; }
  .badge-green { background:var(--green); color:#fff; }
  .badge-purple { background:var(--purple); color:#fff; }
  .badge-ocean { background:var(--ocean-pill); color:#fff; }
  .timestamp { text-align:right; margin-top:10px; font-size:10px; font-weight:300; color:var(--text-dim); font-style:italic; }
  @media (max-width:680px) {
    .desktop-view { display:none; }
    .mobile-view { display:block; }
    .month-title { font-size:18px; min-width:120px; }
    .region-legend { display:none; }
    .wrapper { padding:14px 12px 20px; }
    .summary-cards { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="cal-header">
    <div class="month-nav">
      <button class="nav-btn" id="prevBtn">&#8592;</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" id="nextBtn">&#8594;</button>
    </div>
    <div class="region-legend">
      <div class="region-item"><span class="region-dot" style="background:var(--dot-apac)"></span> APAC</div>
      <div class="region-item"><span class="region-dot" style="background:var(--dot-emea)"></span> EMEA</div>
      <div class="region-item"><span class="region-dot" style="background:var(--dot-nam)"></span> NAM</div>
      <div class="region-item"><span class="region-dot" style="background:var(--dot-latam)"></span> LATAM</div>
    </div>
  </div>
  <div class="desktop-view"><div class="cal-grid" id="calGrid"></div></div>
  <div class="mobile-view"><div class="agenda-list" id="agendaList"></div></div>
  <div class="legend">
    <div class="legend-item"><span class="legend-pill" style="background:var(--ocean-pill)"></span> Module</div>
    <div class="legend-item"><span class="legend-pill" style="background:var(--sky)"></span> Certification</div>
    <div class="legend-item"><span class="legend-pill" style="background:var(--green)"></span> Sparks / Launch</div>
    <div class="legend-item"><span class="legend-pill" style="background:rgba(0,152,69,0.4);border:1px solid rgba(0,152,69,0.5)"></span> Protected Time</div>
    <div class="legend-item"><span class="legend-pill" style="background:var(--purple)"></span> Offsite</div>
    <div class="legend-sep"></div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--dot-apac)"></span> APAC Holiday</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--dot-emea)"></span> EMEA Holiday</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--dot-nam)"></span> NAM Holiday</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--dot-latam)"></span> LATAM Holiday</div>
  </div>
  <div class="summary-cards" id="summaryCards"></div>
  <div class="timestamp" id="timestamp"></div>
</div>
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="ttTitle"></div>
  <div class="tooltip-desc" id="ttDesc"></div>
  <div class="tooltip-tags" id="ttTags"></div>
</div>
<script>
const EVENTS={
  "2026-4-6":[{title:"Analytics: Move to Cloud",type:"module",hours:1,desc:"Understand Qlik's cloud analytics strategy and how to position the migration story with customers."}],
  "2026-4-13":[{title:"Data: Intro to Agentic DE",type:"module",hours:1,desc:"Introduction to Agentic Data Engineering — core concepts, use cases, and how to frame the conversation."}],
  "2026-4-27":[{title:"Data: Talend to QTC",type:"module",hours:1,desc:"Talend to Qlik Talend Cloud positioning: migration talking points and competitive differentiation."},{title:"KOP Offsite",type:"offsite",span:4,desc:"Qlik KOP offsite event. Apr 27–30."}],
  "2026-4-28":[{title:"KOP Offsite",type:"offsite",spanMid:true,desc:""}],
  "2026-4-29":[{title:"KOP Offsite",type:"offsite",spanMid:true,desc:""}],
  "2026-4-30":[{title:"KOP Offsite",type:"offsite",spanEnd:true,desc:""}],
  "2026-5-4":[{title:"Qlik Open Lakehouse Launch",type:"spark",hours:1,desc:"Sales Play launch for Qlik Open Lakehouse. Positioning, messaging, and key differentiators for the field."}],
  "2026-5-11":[{title:"Q2 Cert: Story Selling",type:"cert",hours:1,desc:"Q2 Certification — Story Selling. Complete this module to earn your Q2 certification badge."},{title:"Singapore Offsite",type:"offsite",span:4,desc:"Singapore regional offsite. May 11–14."}],
  "2026-5-12":[{title:"Singapore Offsite",type:"offsite",spanMid:true,desc:""}],
  "2026-5-13":[{title:"Singapore Offsite",type:"offsite",spanMid:true,desc:""}],
  "2026-5-14":[{title:"Singapore Offsite",type:"offsite",spanEnd:true,desc:""}],
  "2026-5-18":[{title:"Tools: AI to Accelerate Pipeline",type:"module",hours:1,desc:"Tools and workflows for using AI to accelerate pipeline generation. Practical techniques for sellers."},{title:"Lund Offsite",type:"offsite",span:4,desc:"Lund regional offsite. May 18–21."}],
  "2026-5-19":[{title:"Lund Offsite",type:"offsite",spanMid:true,desc:""}],
  "2026-5-20":[{title:"Lund Offsite",type:"offsite",spanMid:true,desc:""}],
  "2026-5-21":[{title:"Lund Offsite",type:"offsite",spanEnd:true,desc:""}],
  "2026-5-25":[{title:"End of Month — Protected Seller Time",type:"protected",protectedTime:true,desc:"No internal meetings or training. Dedicated time for sellers to focus on pipeline and end-of-month close activities."}],
  "2026-6-1":[{title:"Data: Agentic DE",type:"module",hours:3,desc:"Deep dive into Agentic Data Engineering — advanced positioning, technical differentiation, and customer scenarios."}],
  "2026-6-8":[{title:"Engaging the Ecosystem",type:"module",hours:2,desc:"Partner and ecosystem engagement strategies. How to leverage alliances to expand pipeline and accelerate deals."}],
  "2026-6-15":[{title:"Q2 EoQ — Protected Seller Time",type:"protected",protectedTime:true,desc:"End of Quarter protected time. No training or internal meetings. Focus on Q2 close."}],
  "2026-6-22":[{title:"Q2 EoQ — Protected Seller Time",type:"protected",protectedTime:true,desc:"End of Quarter protected time. No training or internal meetings. Focus on Q2 close."}]
};
const HOLIDAYS={
  "2026-4-3":["apac","emea","nam","latam"],"2026-4-6":["apac","emea"],"2026-4-21":["latam"],
  "2026-4-27":["apac","emea"],"2026-4-29":["apac"],"2026-5-1":["apac","emea","latam"],
  "2026-5-4":["apac","emea"],"2026-5-5":["apac","emea"],"2026-5-8":["emea"],"2026-5-14":["emea"],
  "2026-5-18":["nam"],"2026-5-25":["apac","emea","nam"],"2026-6-1":["apac","emea"],
  "2026-6-4":["emea","latam"],"2026-6-9":["apac"],"2026-6-16":["apac"],"2026-6-20":["apac","emea"],"2026-6-25":["emea","nam"]
};
const SUMMARY={
  4:[{label:"KOP Offsite — All Hands",badge:"Apr 27–30",cls:"badge-purple"},{label:"Modules this month",badge:"3 Modules",cls:"badge-ocean"}],
  5:[{label:"Q2 Certification: Story Selling",badge:"Due May 22",cls:"badge-sky"},{label:"Singapore Offsite",badge:"May 11–14",cls:"badge-purple"},{label:"Lund Offsite",badge:"May 18–21",cls:"badge-purple"}],
  6:[{label:"Q2 End of Quarter — Protected",badge:"Jun 15 & 22",cls:"badge-green"},{label:"Modules this month",badge:"2 Modules",cls:"badge-ocean"}]
};
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS=["SUN","MON","TUE","WED","THU","FRI","SAT"];
const DSHORT=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const RC={apac:"var(--dot-apac)",emea:"var(--dot-emea)",nam:"var(--dot-nam)",latam:"var(--dot-latam)"};
const TC={module:"ttag-ocean",cert:"ttag-sky",spark:"ttag-green",protected:"ttag-green",offsite:"ttag-purple"};
const TL={module:"Module",cert:"Certification",spark:"Sparks / Launch",protected:"Protected Time",offsite:"Offsite Event"};
const RN={apac:"APAC",emea:"EMEA",nam:"NAM",latam:"LATAM"};

const today=new Date();
let cY=2026,cM=5;
if(today.getFullYear()===2026&&today.getMonth()+1>=4&&today.getMonth()+1<=6) cM=today.getMonth()+1;

function dk(y,m,d){return`${y}-${m}-${d}`;}
function isTd(y,m,d){return y===today.getFullYear()&&m===(today.getMonth()+1)&&d===today.getDate();}

const tooltip=document.getElementById("tooltip");
function showTT(e,ev,tf,hols){
  if(!ev.desc)return;
  document.getElementById("ttTitle").textContent=ev.title;
  document.getElementById("ttDesc").textContent=ev.desc;
  const tg=document.getElementById("ttTags");tg.innerHTML="";
  const addTag=(text,cls)=>{const t=document.createElement("span");t.className=`ttag ${cls}`;t.textContent=text;tg.appendChild(t);};
  addTag(TL[ev.type]||ev.type,TC[ev.type]||"ttag-dark");
  if(ev.hours)addTag(`${ev.hours} hr`,"ttag-dark");
  if(tf)addTag("Starts today","ttag-today");
  if(hols&&hols.length)addTag(hols.map(r=>RN[r]).join(" + ")+" holidays","ttag-dark");
  tooltip.classList.add("visible");
  const tw=240,th=tooltip.offsetHeight||140;
  let x=e.clientX+14,y=e.clientY+14;
  if(x+tw>window.innerWidth-10)x=e.clientX-tw-14;
  if(y+th>window.innerHeight-10)y=e.clientY-th-14;
  tooltip.style.left=x+"px";tooltip.style.top=y+"px";
}
document.addEventListener("click",()=>tooltip.classList.remove("visible"));
document.addEventListener("scroll",()=>tooltip.classList.remove("visible"),true);

function renderDesktop(){
  const grid=document.getElementById("calGrid");grid.innerHTML="";
  DAYS.forEach(d=>{const h=document.createElement("div");h.className="day-header";h.textContent=d;grid.appendChild(h);});
  const fd=new Date(cY,cM-1,1).getDay(),dim=new Date(cY,cM,0).getDate();
  for(let i=0;i<fd;i++){const c=document.createElement("div");c.className="cal-cell empty";grid.appendChild(c);}
  for(let d=1;d<=dim;d++){
    const key=dk(cY,cM,d),dow=(fd+d-1)%7,tf=isTd(cY,cM,d),evs=EVENTS[key]||[],hols=HOLIDAYS[key]||[],hasProt=evs.some(e=>e.protectedTime);
    const cell=document.createElement("div");
    cell.className="cal-cell"+(dow===0||dow===6?" weekend":"")+(tf?" today":"")+(hasProt?" protected-bg":"");
    const de=document.createElement("div");de.className="cell-date";de.textContent=d;cell.appendChild(de);
    evs.forEach(ev=>{
      if(ev.spanMid||ev.spanEnd){const g=document.createElement("span");g.className=`event-pill pill-${ev.type}`;g.style.opacity="0";g.textContent="\u00a0";cell.appendChild(g);return;}
      const p=document.createElement("span");p.className=`event-pill pill-${ev.type}`;
      p.textContent=ev.title+(ev.hours?` — ${ev.hours}hr`:"");
      p.addEventListener("click",e=>{e.stopPropagation();showTT(e,ev,tf,hols);});
      cell.appendChild(p);
    });
    if(hols.length){const dots=document.createElement("div");dots.className="holiday-dots";hols.forEach(r=>{const dot=document.createElement("span");dot.className="hdot";dot.style.background=RC[r];dots.appendChild(dot);});cell.appendChild(dots);}
    grid.appendChild(cell);
  }
}

function getWeeks(y,m){
  const dim=new Date(y,m,0).getDate();let weeks=[],wn=1,cw=null;
  for(let d=1;d<=dim;d++){
    const dow=new Date(y,m-1,d).getDay();
    if(dow===1||d===1){if(cw)weeks.push(cw);cw={wn:wn++,days:[]};}
    cw.days.push({d,dow});
  }
  if(cw&&cw.days.length)weeks.push(cw);
  return weeks;
}

function renderMobile(){
  const list=document.getElementById("agendaList");list.innerHTML="";
  getWeeks(cY,cM).forEach(week=>{
    const fd=week.days[0].d,ld=week.days[week.days.length-1].d;
    const hasEvs=week.days.some(({d})=>(EVENTS[dk(cY,cM,d)]||[]).filter(e=>!e.spanMid&&!e.spanEnd).length>0);
    const block=document.createElement("div");block.className="agenda-week";
    const hdr=document.createElement("div");hdr.className="agenda-week-header";
    hdr.innerHTML=`<span>Week ${week.wn}</span><span class="agenda-week-dates">${MONTHS[cM-1].slice(0,3)} ${fd}–${ld}</span>`;
    block.appendChild(hdr);
    if(!hasEvs){const emp=document.createElement("div");emp.className="agenda-no-events";emp.textContent="No scheduled enablement this week";block.appendChild(emp);}
    else{
      week.days.forEach(({d,dow})=>{
        const key=dk(cY,cM,d),evs=(EVENTS[key]||[]).filter(e=>!e.spanMid&&!e.spanEnd),hols=HOLIDAYS[key]||[],tf=isTd(cY,cM,d);
        if(!evs.length)return;
        const row=document.createElement("div");row.className="agenda-day"+(tf?" today-day":"");
        const lbl=document.createElement("div");lbl.className="agenda-day-label";
        lbl.innerHTML=`<div class="agenda-day-num">${d}</div><div class="agenda-day-name">${DSHORT[dow]}</div>`;
        row.appendChild(lbl);
        const evc=document.createElement("div");evc.className="agenda-events";
        evs.forEach(ev=>{
          const p=document.createElement("div");p.className=`agenda-pill pill-${ev.type}`;
          p.innerHTML=`<div>${ev.title}${ev.hours?` <span style="opacity:0.7;font-weight:400">— ${ev.hours}hr</span>`:""}</div>${ev.desc?`<div class="pill-sub">${ev.desc.length>80?ev.desc.slice(0,80)+"…":ev.desc}</div>`:""}`;
          p.addEventListener("click",e=>{e.stopPropagation();showTT(e,ev,tf,hols);});
          evc.appendChild(p);
        });
        if(hols.length){const dots=document.createElement("div");dots.className="agenda-dots";hols.forEach(r=>{const dot=document.createElement("span");dot.className="hdot";dot.style.background=RC[r];dots.appendChild(dot);});evc.appendChild(dots);}
        row.appendChild(evc);block.appendChild(row);
      });
    }
    list.appendChild(block);
  });
}

function render(){
  document.getElementById("monthTitle").textContent=`${MONTHS[cM-1]} ${cY}`;
  document.getElementById("prevBtn").disabled=(cY===2026&&cM===4);
  document.getElementById("nextBtn").disabled=(cY===2026&&cM===6);
  renderDesktop();renderMobile();
  const cards=document.getElementById("summaryCards");cards.innerHTML="";
  (SUMMARY[cM]||[]).forEach(s=>{const c=document.createElement("div");c.className="summary-card";c.innerHTML=`<span class="summary-card-label">${s.label}</span><span class="summary-badge ${s.cls}">${s.badge}</span>`;cards.appendChild(c);});
  const now=new Date();
  document.getElementById("timestamp").textContent=`Last updated: ${now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} at ${now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}`;
}

document.getElementById("prevBtn").addEventListener("click",()=>{if(cY===2026&&cM===4)return;cM--;if(cM<1){cM=12;cY--;}render();});
document.getElementById("nextBtn").addEventListener("click",()=>{if(cY===2026&&cM===6)return;cM++;if(cM>12){cM=1;cY++;}render();});
render();
</script>
</body>
</html>
