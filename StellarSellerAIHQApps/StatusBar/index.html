<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Status Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d2a47;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .status-bar {
    height: 36px;
    background: #0d2a47;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    margin-right: 24px;
    white-space: nowrap;
  }

  .providers {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .provider {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .provider:hover { opacity: 0.75; }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.operational {
    background: #009845;
    box-shadow: 0 0 6px rgba(0, 152, 69, 0.7);
    animation: pulse-green 2s ease-in-out infinite;
  }

  .dot.minor {
    background: #8B5CF6;
    box-shadow: 0 0 8px rgba(139, 92, 246, 0.8);
    animation: pulse-purple 2s ease-in-out infinite;
  }

  .dot.major, .dot.critical {
    background: #f97316;
    box-shadow: 0 0 10px rgba(249, 115, 22, 0.9);
    animation: flash-orange 0.6s ease-in-out infinite;
  }

  .dot.unknown {
    background: rgba(255,255,255,0.25);
  }

  @keyframes pulse-green {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  @keyframes pulse-purple {
    0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px rgba(139, 92, 246, 0.8); }
    50% { opacity: 0.6; transform: scale(0.85); box-shadow: 0 0 4px rgba(139, 92, 246, 0.4); }
  }

  @keyframes flash-orange {
    0%, 100% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 12px rgba(249, 115, 22, 1); }
    50% { opacity: 0.3; transform: scale(0.8); box-shadow: 0 0 4px rgba(249, 115, 22, 0.3); }
  }

  .provider-icon {
    width: 14px;
    height: 14px;
    opacity: 0.85;
    flex-shrink: 0;
  }

  .provider-name {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
  }

  .provider-status {
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .divider {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.08);
  }

  .updated {
    margin-left: 24px;
    font-size: 10px;
    font-weight: 300;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="status-bar">
  <span class="label">AI Status</span>
  <div class="providers" id="providers"></div>
  <span class="updated" id="updated"></span>
</div>

<script>
  const VERCEL_API = 'https://qlik-mindtickle-apps.vercel.app/api/status';
  const CACHE_KEY = 'ss_status_cache_v2';
  const CACHE_TTL = 5 * 60 * 1000;

  const PROVIDER_META = {
    'Claude': {
      url: 'https://status.anthropic.com',
      icon: `<svg class="provider-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M17.3 3h-3.1L9.7 14.4H12l1.2-3.3h4.1l1.2 3.3h2.3L17.3 3zm-3.4 6.6 1.5-4.1 1.5 4.1h-3zM6.7 3H4.4L1 21h2.3l.9-4.1h4.1L9.2 21h2.3L8.1 3H6.7zm-2 11.6 1.5-7 1.5 7h-3z"/></svg>`
    },
    'ChatGPT': {
      url: 'https://status.openai.com',
      icon: `<svg class="provider-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M22.28 9.29a5.93 5.93 0 0 0-.51-4.87 6 6 0 0 0-6.44-2.88 5.93 5.93 0 0 0-4.47-2A6 6 0 0 0 5.14 3.2a5.93 5.93 0 0 0-4 2.88 6 6 0 0 0 .74 7 5.93 5.93 0 0 0 .51 4.87 6 6 0 0 0 6.44 2.88 5.93 5.93 0 0 0 4.47 2 6 6 0 0 0 5.72-4.16 5.93 5.93 0 0 0 4-2.88 6 6 0 0 0-.74-7.3zM13.38 21a4.44 4.44 0 0 1-2.85-1 .09.09 0 0 1 0 0l.36-.21 4.74-2.73a.77.77 0 0 0 .39-.68v-6.67l2 1.16a.07.07 0 0 1 0 .05v5.52A4.49 4.49 0 0 1 13.38 21zm-9.7-4.12a4.44 4.44 0 0 1-.53-3 .09.09 0 0 1 0 0l.36.21 4.74 2.73a.77.77 0 0 0 .78 0L14.49 14v2.32a.08.08 0 0 1 0 .06l-4.8 2.77a4.49 4.49 0 0 1-6.01-2.27zM3.08 8.09A4.44 4.44 0 0 1 5.44 6l-.01.42v5.46a.77.77 0 0 0 .39.68l5.36 3.09-2 1.16a.08.08 0 0 1-.06 0L4.32 14a4.49 4.49 0 0 1-1.24-5.91zm16.44 3.87-5.36-3.09 2-1.16a.07.07 0 0 1 .06 0l4.8 2.77a4.49 4.49 0 0 1-.7 8.1v-.42l.01-5.46a.77.77 0 0 0-.39-.67l-.01-.07zm2-3a.09.09 0 0 1 0 0l-.36-.21-4.74-2.73a.77.77 0 0 0-.78 0L9.51 9V6.68a.07.07 0 0 1 0-.06l4.8-2.77a4.49 4.49 0 0 1 6.67 4.65l-.46-.54zm-12.54 4.13-2-1.16a.08.08 0 0 1 0-.05V6.36a4.49 4.49 0 0 1 7.37-3.44l-.36.21-4.74 2.73a.77.77 0 0 0-.39.68l.12 6.66zm1.09-2.35L12 9.53l2 1.14v2.28l-2 1.14-2-1.15V10.7z"/></svg>`
    },
    'Gemini': {
      url: 'https://status.cloud.google.com',
      icon: `<svg class="provider-icon" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M12 24A14.3 14.3 0 0 1 9.8 12 14.3 14.3 0 0 1 12 0a14.3 14.3 0 0 1 2.2 12A14.3 14.3 0 0 1 12 24zm0 0a14.3 14.3 0 0 1-12-2.2A14.3 14.3 0 0 1 12 9.8a14.3 14.3 0 0 1 12 2.2A14.3 14.3 0 0 1 12 24z"/></svg>`
    }
  };

  function getStatusLabel(status) {
    switch(status) {
      case 'operational': return 'All Clear';
      case 'minor': return 'Potential D.O.R.C.S. Activity';
      case 'major': return 'D.O.R.C.S. Attacking!';
      case 'critical': return 'D.O.R.C.S. Attacking!';
      default: return 'Status Unknown';
    }
  }

  function buildBar(statuses) {
    const container = document.getElementById('providers');
    container.innerHTML = '';

    statuses.forEach((provider, i) => {
      if (i > 0) {
        const div = document.createElement('div');
        div.className = 'divider';
        container.appendChild(div);
      }

      const meta = PROVIDER_META[provider.name] || { url: '#', icon: '' };

      const el = document.createElement('a');
      el.className = 'provider';
      el.href = meta.url;
      el.target = '_blank';
      el.rel = 'noopener noreferrer';
      el.innerHTML = `
        <div class="dot ${provider.status}"></div>
        ${meta.icon}
        <span class="provider-name">${provider.name}</span>
        <span class="provider-status">${getStatusLabel(provider.status)}</span>
      `;
      container.appendChild(el);
    });

    const now = new Date();
    document.getElementById('updated').textContent =
      `Updated ${now.toLocaleTimeString('en-us', { hour: 'numeric', minute: '2-digit' })}`;
  }

  async function loadStatus() {
    try {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        const { data, timestamp } = JSON.parse(cached);
        if (Date.now() - timestamp < CACHE_TTL) { buildBar(data); return; }
      }
    } catch(e) {}

    try {
      const res = await fetch(VERCEL_API);
      const data = await res.json();
      localStorage.setItem(CACHE_KEY, JSON.stringify({ data, timestamp: Date.now() }));
      buildBar(data);
    } catch(e) {
      document.getElementById('providers').innerHTML =
        '<span style="color:rgba(255,255,255,0.3);font-size:12px;">Status unavailable</span>';
    }
  }

  loadStatus();
  setInterval(loadStatus, 5 * 60 * 1000);
</script>
</body>
</html>
