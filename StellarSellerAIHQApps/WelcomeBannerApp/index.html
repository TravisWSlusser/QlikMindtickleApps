<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #009845;
    --sky: #10CFC9;
    --deep-blue: #19426C;
    --white: #ffffff;
  }

  body {
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    background: #0d2a47;
  }

  .banner {
    position: relative;
    width: 100%;
    height: 320px;
    overflow: hidden;
  }

  .bg {
    position: absolute;
    inset: 0;
    background-image: url('https://raw.githubusercontent.com/TravisWSlusser/QlikMindtickleApps/main/images/HQBackground_compressed.png');
    background-size: cover;
    background-position: center;
    filter: brightness(0.55);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      rgba(13, 42, 71, 0.85) 0%,
      rgba(13, 42, 71, 0.6) 50%,
      rgba(13, 42, 71, 0.3) 100%
    );
  }

  .side-qlik {
    position: absolute;
    bottom: 0;
    right: 60px;
    width: 240px;
    height: auto;
    transform: translateX(300px);
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 3;
    filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.4));
  }

  .side-qlik.visible { transform: translateX(0); }

  .content {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 30px;
    z-index: 2;
    display: flex;
    align-items: center;
    padding: 0 48px;
  }

  .welcome-msg {
    position: absolute;
    opacity: 0;
    transition: opacity 0.6s ease;
    max-width: 65%;
  }

  .welcome-msg.active { opacity: 1; }

  .welcome-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green);
    border-radius: 4px;
    padding: 4px 12px;
    margin-bottom: 14px;
  }

  .welcome-tag span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
  }

  .welcome-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 900;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 12px;
  }

  .welcome-title span { color: var(--sky); }

  .welcome-body {
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
    max-width: 520px;
  }

  .tip-msg {
    position: absolute;
    opacity: 0;
    transition: opacity 0.6s ease;
    max-width: 65%;
  }

  .tip-msg.active { opacity: 1; }

  .tip-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.5;
    max-width: 560px;
    margin-bottom: 10px;
  }

  .tip-category {
    font-size: 11px;
    font-weight: 600;
    color: var(--sky);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: var(--green);
    width: 0%;
    z-index: 4;
    transition: width linear;
  }

  .dots {
    position: absolute;
    bottom: 16px;
    left: 48px;
    display: flex;
    gap: 6px;
    z-index: 4;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.3s;
  }

  .dot.active { background: var(--sky); }
  .dot.welcome { background: var(--green); }

  /* ── MOBILE BLOCK ── */
  @media (max-width: 480px) {
    .mobile-block { display: flex !important; }
  }

  .mobile-icon {
    opacity: 0;
    transform: translateY(-20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .mobile-icon.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .mobile-text {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .mobile-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .mobile-sub {
    opacity: 0;
    transition: opacity 0.6s ease 0.5s;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    max-width: 240px;
    text-align: center;
  }

  .mobile-sub.visible { opacity: 1; }
</style>
</head>
<body>

<div class="banner">
  <div class="bg"></div>
  <div class="overlay"></div>

  <img class="side-qlik" id="sideQlik"
    src="https://raw.githubusercontent.com/TravisWSlusser/QlikMindtickleApps/main/images/SideQlik1.png"
    alt="Side-Qlik">

  <div class="content">
    <div class="welcome-msg active" id="welcomeMsg">
      <div class="welcome-tag"><span>Welcome Home</span></div>
      <div class="welcome-title">Hey <span>Stellar-Seller</span></div>
      <div class="welcome-body">
        Thanks for stopping by. This is your one-stop-shop for all your AI tools and training needs. Have you used AI in a unique way to help you close a deal? Let us know using the form below.
      </div>
    </div>
    <div id="tipsContainer"></div>
  </div>

  <div class="progress-bar" id="progressBar"></div>
  <div class="dots" id="dots"></div>
</div>

<!-- MOBILE BLOCK -->
<div class="mobile-block" style="display:none; position:fixed; inset:0;
  z-index:9999; align-items:center; justify-content:center;
  flex-direction:column; gap:16px; padding:24px; text-align:center;
  backdrop-filter: blur(12px) brightness(0.35);
  -webkit-backdrop-filter: blur(12px) brightness(0.35);
  background: rgba(13, 42, 71, 0.6);">
  <img id="mobileIcon"
    src="https://raw.githubusercontent.com/TravisWSlusser/QlikMindtickleApps/main/images/icons/BadFX2.png"
    class="mobile-icon"
    style="width:70px; height:70px; filter: invert(1) sepia(1) saturate(2) hue-rotate(155deg) brightness(1.1);">
  <p id="mobileText" class="mobile-text"></p>
  <p id="mobileSub" class="mobile-sub">This widget is optimized for larger screens.</p>
</div>

<script>
  const tips = [
    { text: 'Before your next call, ask AI: "Summarize [Company]\'s recent news and identify one business disruption they may not have named yet."', category: 'AI Tip · Act 2 — Disruption' },
    { text: 'Use AI to pressure-test your story: "I\'m selling to a CFO. Does my Act 3 resolution speak to business outcomes or just features?"', category: 'AI Tip · Act 3 — Resolution' },
    { text: 'Ask AI to generate discovery questions specific to each Buying Influence — Economic, User, Technical, Coach — before every meeting.', category: 'AI Tip · Story Prep' },
    { text: 'Try this prompt: "What industry trends could be disrupting [prospect\'s industry] right now?" — builds your Act 1 Situation.', category: 'AI Tip · Act 1 — Situation' },
    { text: 'AI can\'t replace your Coach relationship — but it can help you prep what to leave behind: "Write a one-page summary of our resolution story for a [role] at [company]."', category: 'AI Tip · Coach Influence' },
    { text: 'The competitive contrast in one sentence: "Unlike AI bolted on raw data, Qlik\'s AI runs on a governed pipeline — the answers are trustworthy and auditable."', category: 'AI Tip · Competitive Readiness' },
    { text: 'Always validate AI output before using it in a customer conversation — governed answers start with governed prompts.', category: 'AI Tip · Best Practice' },
    { text: 'Give AI a role: "Act as a skeptical CFO. Challenge my business case for Qlik." — sharpen your story before the room does.', category: 'AI Tip · Story Prep' }
  ];

  const WELCOME_DURATION = 16000;
  const TIP_DURATION = 8000;
  let currentIndex = -1;
  let timer;

  const sideQlik = document.getElementById('sideQlik');
  const welcomeMsg = document.getElementById('welcomeMsg');
  const tipsContainer = document.getElementById('tipsContainer');
  const progressBar = document.getElementById('progressBar');
  const dotsEl = document.getElementById('dots');

  tips.forEach((tip, i) => {
    const el = document.createElement('div');
    el.className = 'tip-msg';
    el.id = `tip-${i}`;
    el.innerHTML = `<div class="tip-text">${tip.text}</div><div class="tip-category">${tip.category}</div>`;
    tipsContainer.appendChild(el);
  });

  const welcomeDot = document.createElement('div');
  welcomeDot.className = 'dot welcome active';
  dotsEl.appendChild(welcomeDot);
  tips.forEach(() => { const d = document.createElement('div'); d.className = 'dot'; dotsEl.appendChild(d); });

  function updateDots(index) {
    dotsEl.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.remove('active', 'welcome');
      if (index === -1 && i === 0) d.classList.add('welcome', 'active');
      else if (i === index + 1) d.classList.add('active');
    });
  }

  function animateProgress(duration) {
    progressBar.style.transition = 'none';
    progressBar.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progressBar.style.transition = `width ${duration}ms linear`;
      progressBar.style.width = '100%';
    }));
  }

  function showWelcome() {
    currentIndex = -1;
    document.querySelectorAll('.tip-msg').forEach(t => t.classList.remove('active'));
    welcomeMsg.classList.add('active');
    setTimeout(() => sideQlik.classList.add('visible'), 100);
    updateDots(-1);
    animateProgress(WELCOME_DURATION);
    timer = setTimeout(showNextTip, WELCOME_DURATION);
  }

  function showNextTip() {
    currentIndex = (currentIndex + 1) % tips.length;
    welcomeMsg.classList.remove('active');
    document.querySelectorAll('.tip-msg').forEach(t => t.classList.remove('active'));
    document.getElementById(`tip-${currentIndex}`).classList.add('active');
    sideQlik.classList.remove('visible');
    updateDots(currentIndex);
    animateProgress(TIP_DURATION);
    timer = currentIndex === tips.length - 1 ? setTimeout(showWelcome, TIP_DURATION) : setTimeout(showNextTip, TIP_DURATION);
  }

  showWelcome();

  // ── MOBILE GLITCH ──
  const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&!?><[]{}";
  const TARGET = "BEST VIEWED ON DESKTOP OR TABLET";
  const mobileText = document.getElementById('mobileText');
  const mobileIcon = document.getElementById('mobileIcon');
  const mobileSub = document.getElementById('mobileSub');

  function rand() { return CHARS[Math.floor(Math.random() * CHARS.length)]; }

  function glitchIn(original, el, callback) {
    let i = 0; const frames = 12;
    const t = setInterval(function() {
      const p = i / frames;
      el.textContent = original.split('').map(c => c === ' ' ? ' ' : Math.random() < (1 - p) ? rand() : c).join('');
      i++;
      if (i >= frames) { clearInterval(t); el.textContent = original; if (callback) callback(); }
    }, 40);
  }

  function randomGlitch() {
    glitchIn(TARGET, mobileText, function() {
      const delay = (Math.random() * 10000) + 10000;
      setTimeout(randomGlitch, delay);
    });
  }

  function initMobileBlock() {
    setTimeout(function() { mobileIcon.classList.add('visible'); }, 300);
    setTimeout(function() {
      mobileText.classList.add('visible');
      glitchIn(TARGET, mobileText, function() {
        setTimeout(function() { mobileSub.classList.add('visible'); }, 200);
        const delay = (Math.random() * 10000) + 10000;
        setTimeout(randomGlitch, delay);
      });
    }, 700);
  }

  if (window.innerWidth <= 480) initMobileBlock();
  window.addEventListener('resize', function() {
    if (window.innerWidth <= 480) initMobileBlock();
  });
</script>
</body>
</html>
